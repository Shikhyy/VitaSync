  #     - /dev/kfd
  #     - /dev/dri
  #   group_add:
  #     - video
  #     - render
  #   ports:
  #     - "8001:8001"
  #   ipc: host

volumes:
  postgres_data:
  mindsdb_data:
  minio_data:
